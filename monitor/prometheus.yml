# Prometheus Configuration
# Scrapes metrics from all services in the network lab

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'network-lab'
    environment: 'local'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          layer: 'monitoring'

  # Node Exporter - Router container metrics
  - job_name: 'node-exporter-router'
    static_configs:
      - targets: ['10.0.1.254:9100', '10.0.2.254:9100', '10.0.3.254:9100']
        labels:
          service: 'router'
          layer: 'layer3'
          network: 'multi'

  # Node Exporter - DNS container metrics
  - job_name: 'node-exporter-dns'
    static_configs:
      - targets: ['10.0.2.10:9100']
        labels:
          service: 'dns'
          layer: 'layer7'
          network: 'internal'

  # Node Exporter - DHCP container metrics
  - job_name: 'node-exporter-dhcp'
    static_configs:
      - targets: ['10.0.2.11:9100']
        labels:
          service: 'dhcp'
          layer: 'layer7'
          network: 'internal'

  # Node Exporter - Web1 container metrics
  - job_name: 'node-exporter-web1'
    static_configs:
      - targets: ['10.0.1.10:9100']
        labels:
          service: 'web1'
          layer: 'layer7'
          network: 'dmz'

  # Node Exporter - Web2 container metrics
  - job_name: 'node-exporter-web2'
    static_configs:
      - targets: ['10.0.1.11:9100']
        labels:
          service: 'web2'
          layer: 'layer7'
          network: 'dmz'

  # Node Exporter - HAProxy container metrics
  - job_name: 'node-exporter-haproxy'
    static_configs:
      - targets: ['10.0.3.10:9100', '10.0.1.20:9100']
        labels:
          service: 'haproxy'
          layer: 'layer4-layer7'
          network: 'public-dmz'
