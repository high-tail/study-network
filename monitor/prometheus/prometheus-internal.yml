# Prometheus Configuration - INTERNAL Network (10.0.2.0/24)
# Static configuration for Internal network services
# Monitors: DNS, DHCP, Router (internal interface)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'network-lab'
    environment: 'local'
    network: 'internal'
    network_segment: '10.0.2.0/24'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "/etc/prometheus/rules/*.yml"

# Remote write configuration (for receiving K6 metrics)
# Note: Prometheus uses remote_write for sending, but K6 uses the
# Prometheus remote write protocol endpoint which is enabled by default

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus-internal'
          osi_layer: 'monitoring'
          network: 'internal'

  # Node Exporter - Router Internal interface
  - job_name: 'node-exporter-router'
    static_configs:
      - targets: ['10.0.2.254:9100']
        labels:
          service: 'router'
          interface: 'internal'
          osi_layer: 'layer3'
          network: 'internal'

  # Node Exporter - DNS container metrics
  - job_name: 'node-exporter-dns'
    static_configs:
      - targets: ['10.0.2.10:9100']
        labels:
          service: 'dns'
          osi_layer: 'layer7'
          network: 'internal'

  # Node Exporter - DHCP container metrics
  - job_name: 'node-exporter-dhcp'
    static_configs:
      - targets: ['10.0.2.11:9100']
        labels:
          service: 'dhcp'
          osi_layer: 'layer7'
          network: 'internal'
