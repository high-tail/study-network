# Prometheus Configuration - DMZ Network (10.0.1.0/24)
# Static configuration for DMZ network services
# Monitors: Web1, Web2, HAProxy (DMZ interface), Router (DMZ interface)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'network-lab'
    environment: 'local'
    network: 'dmz'
    network_segment: '10.0.1.0/24'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "/etc/prometheus/rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus-dmz'
          osi_layer: 'monitoring'
          network: 'dmz'

  # Node Exporter - Router DMZ interface
  - job_name: 'node-exporter-router'
    static_configs:
      - targets: ['10.0.1.254:9100']
        labels:
          service: 'router'
          interface: 'dmz'
          osi_layer: 'layer3'
          network: 'dmz'

  # Node Exporter - Web1 container metrics
  - job_name: 'node-exporter-web1'
    static_configs:
      - targets: ['10.0.1.10:9100']
        labels:
          service: 'web1'
          osi_layer: 'layer7'
          network: 'dmz'

  # Node Exporter - Web2 container metrics
  - job_name: 'node-exporter-web2'
    static_configs:
      - targets: ['10.0.1.11:9100']
        labels:
          service: 'web2'
          osi_layer: 'layer7'
          network: 'dmz'

  # Node Exporter - Web3 container metrics (HTTPS/TLS)
  - job_name: 'node-exporter-web3'
    static_configs:
      - targets: ['10.0.1.12:9100']
        labels:
          service: 'web3'
          osi_layer: 'layer7'
          network: 'dmz'
          tls_enabled: 'true'

  # Node Exporter - HAProxy DMZ interface
  - job_name: 'node-exporter-haproxy'
    static_configs:
      - targets: ['10.0.1.20:9100']
        labels:
          service: 'haproxy'
          interface: 'dmz'
          osi_layer: 'layer4-layer7'
          network: 'dmz'
