# Prometheus Configuration - PUBLIC Network (10.0.3.0/24)
# Static configuration for Public network services
# Monitors: HAProxy (public interface), Grafana, Router (public interface)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'network-lab'
    environment: 'local'
    network: 'public'
    network_segment: '10.0.3.0/24'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "/etc/prometheus/rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus-public'
          osi_layer: 'monitoring'
          network: 'public'

  # Node Exporter - Router Public interface
  - job_name: 'node-exporter-router'
    static_configs:
      - targets: ['10.0.3.254:9100']
        labels:
          service: 'router'
          interface: 'public'
          osi_layer: 'layer3'
          network: 'public'

  # Node Exporter - HAProxy Public interface
  - job_name: 'node-exporter-haproxy'
    static_configs:
      - targets: ['10.0.3.10:9100']
        labels:
          service: 'haproxy'
          interface: 'public'
          osi_layer: 'layer4-layer7'
          network: 'public'
