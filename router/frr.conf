# FRRouting Configuration
# This router connects three networks: DMZ, Internal, and Public
# Layer 3 (Network Layer) - Routing between subnets

# Hostname
hostname router

# Logging
log file /var/log/frr/frr.log
log timestamp precision 6

# Enable password for VTY access
password zebra
enable password zebra

# Static routes between networks
# These routes are implicit as all networks are directly connected
# Connected routes will be automatically added by FRR

# Interface configuration
interface eth0
 description Connection to DMZ Network
 ip address 10.0.1.254/24
!

interface eth1
 description Connection to Internal Network
 ip address 10.0.2.254/24
!

interface eth2
 description Connection to Public Network
 ip address 10.0.3.254/24
!

# Line configuration for VTY (Virtual Terminal)
line vty
 exec-timeout 0 0
!
