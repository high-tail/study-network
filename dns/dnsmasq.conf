# Dnsmasq Configuration
# Local DNS server for network lab - provides name resolution

# Listen on all interfaces
interface=eth0
bind-interfaces

# DNS port
port=53

# Do not read /etc/resolv.conf or /etc/hosts
no-resolv
no-hosts

# Upstream DNS servers (Google DNS as fallback)
server=8.8.8.8
server=8.8.4.4

# Local domain
domain=netlab.local
local=/netlab.local/

# Expand simple names with domain
expand-hosts

# Static host mappings for lab environment
# Router
address=/router.netlab.local/10.0.1.254

# DNS Server
address=/dns.netlab.local/10.0.2.10

# DHCP Server
address=/dhcp.netlab.local/10.0.2.11

# Web Servers
address=/web1.netlab.local/10.0.1.10
address=/web2.netlab.local/10.0.1.11

# Load Balancer
address=/haproxy.netlab.local/10.0.3.10
address=/lb.netlab.local/10.0.3.10

# Monitoring
address=/prometheus.netlab.local/10.0.2.20
address=/grafana.netlab.local/10.0.2.21
address=/monitor.netlab.local/10.0.2.21

# Node Exporter
address=/node-exporter.netlab.local/10.0.2.22

# cAdvisor
address=/cadvisor.netlab.local/10.0.2.23

# PTR records for reverse DNS
ptr-record=254.1.0.10.in-addr.arpa,router.netlab.local
ptr-record=10.2.0.10.in-addr.arpa,dns.netlab.local
ptr-record=11.2.0.10.in-addr.arpa,dhcp.netlab.local
ptr-record=10.1.0.10.in-addr.arpa,web1.netlab.local
ptr-record=11.1.0.10.in-addr.arpa,web2.netlab.local
ptr-record=10.3.0.10.in-addr.arpa,haproxy.netlab.local
ptr-record=20.2.0.10.in-addr.arpa,prometheus.netlab.local
ptr-record=21.2.0.10.in-addr.arpa,grafana.netlab.local

# Cache size
cache-size=1000

# Log all queries for educational purposes
log-queries

# Do not forward private reverse lookups upstream
bogus-priv

# Domain aliases
cname=www.netlab.local,haproxy.netlab.local
cname=api.netlab.local,haproxy.netlab.local
