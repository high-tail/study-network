# HAProxy Configuration
# Layer 4/7 Load Balancer for Web Servers

#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    log stdout format raw local0 info
    maxconn 4096
    user haproxy
    group haproxy

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # Default ciphers to use on SSL-enabled listening sockets
    ssl-default-bind-ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

#---------------------------------------------------------------------
# Common defaults
#---------------------------------------------------------------------
defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

#---------------------------------------------------------------------
# Statistics page
#---------------------------------------------------------------------
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:admin

#---------------------------------------------------------------------
# Frontend - HTTP (Layer 7)
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    mode http

    # Log all requests
    option httplog

    # ACL for path-based routing
    acl url_static path_beg -i /static /images /javascript /stylesheets
    acl url_static path_end -i .jpg .gif .png .css .js .ico

    # Use specific backend based on path
    use_backend static_servers if url_static

    # Default backend
    default_backend web_servers

    # Add custom headers
    http-request set-header X-Forwarded-Proto http
    http-response set-header X-Server-Group web-cluster

#---------------------------------------------------------------------
# Frontend - HTTPS (Layer 7) - Note: SSL cert not configured
#---------------------------------------------------------------------
frontend https_front
    bind *:443
    mode http

    # Default backend
    default_backend web_servers

#---------------------------------------------------------------------
# Backend - Web Servers (Round Robin)
#---------------------------------------------------------------------
backend web_servers
    mode http
    balance roundrobin

    # Health check
    option httpchk GET /health
    http-check expect status 200

    # Cookie-based persistence (optional)
    cookie SERVERID insert indirect nocache

    # Web server pool
    server web1 10.0.1.10:80 check cookie web1 inter 2000 rise 2 fall 3
    server web2 10.0.1.11:80 check cookie web2 inter 2000 rise 2 fall 3

    # Response headers
    http-response set-header X-Backend-Server %s

#---------------------------------------------------------------------
# Backend - Static Content (if needed)
#---------------------------------------------------------------------
backend static_servers
    mode http
    balance roundrobin

    server web1 10.0.1.10:80 check
    server web2 10.0.1.11:80 check

