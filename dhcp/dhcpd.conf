# ISC DHCP Server Configuration
# Dynamic IP address assignment for network lab

# Global parameters
default-lease-time 600;
max-lease-time 7200;

# Use this to send dhcp log messages to a different log file
log-facility local7;

# Authoritative DHCP server
authoritative;

# DNS settings
option domain-name "netlab.local";
option domain-name-servers 10.0.2.10;

# Subnet declaration for Internal Network (10.0.2.0/24)
subnet 10.0.2.0 netmask 255.255.255.0 {
  # IP range for dynamic assignment
  range 10.0.2.100 10.0.2.200;

  # Default gateway (router)
  option routers 10.0.2.254;

  # DNS server
  option domain-name-servers 10.0.2.10;

  # Broadcast address
  option broadcast-address 10.0.2.255;

  # Subnet mask
  option subnet-mask 255.255.255.0;
}

# Static IP reservations (optional - for demonstration)
# These would require MAC addresses of actual containers

# Host declarations for fixed IPs
host dns-server {
  hardware ethernet 02:42:0a:00:02:0a;
  fixed-address 10.0.2.10;
}

host dhcp-server {
  hardware ethernet 02:42:0a:00:02:0b;
  fixed-address 10.0.2.11;
}

# Logging
ddns-update-style none;
